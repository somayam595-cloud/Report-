name: نشر المنصة على GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: جلب ملفات المستودع
        uses: actions/checkout@v4

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: تثبيت الحزم
        run: npm ci

      - name: فحص وبناء المشروع
        run: npm run build

      - name: إعداد GitHub Pages
        uses: actions/configure-pages@v5

      - name: رفع ملفات الموقع
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: نشر الموقع
        id: deployment
        uses: actions/deploy-pages@v4
