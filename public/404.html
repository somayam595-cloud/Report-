<!doctype html>
<html lang="ar" dir="rtl">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>إعادة توجيه</title></head>
  <body>
    <script>
      const parts = location.pathname.split('/').filter(Boolean);
      const root = parts.length ? `/${parts[0]}/` : '/';
      location.replace(`${location.origin}${root}`);
    </script>
  </body>
</html>
